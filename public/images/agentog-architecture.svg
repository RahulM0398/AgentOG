<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" role="img" aria-labelledby="title desc">
  <title id="title">AgentOG action-bound verification</title>
  <desc id="desc">Inputs from phone, web, and AI agents flow through AgentOG fingerprint, human approval, and execution gate; approved actions proceed or changed payloads are blocked.</desc>
  <defs>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fa5400"/>
      <stop offset="100%" stop-color="#e04c00"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="920" height="440" rx="16" fill="#faf8f4" stroke="#e8e3da" stroke-width="2"/>
  <!-- Tagline -->
  <text x="460" y="36" text-anchor="middle" fill="#0a0a0a" font-family="system-ui, sans-serif" font-size="18" font-weight="800">AgentOG</text>
  <text x="460" y="58" text-anchor="middle" fill="#5c5650" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Action-bound approval for AI agents</text>
  <!-- Left inputs -->
  <g font-family="system-ui, sans-serif" font-size="11" fill="#2a2a2a">
    <rect x="32" y="100" width="88" height="56" rx="10" fill="#ffffff" stroke="#e8e3da" stroke-width="1.5"/>
    <text x="76" y="122" text-anchor="middle" font-size="20">=Ţ</text>
    <text x="76" y="148" text-anchor="middle" font-size="10" font-weight="700">Phone</text>
    <rect x="32" y="172" width="88" height="56" rx="10" fill="#ffffff" stroke="#e8e3da" stroke-width="1.5"/>
    <text x="76" y="194" text-anchor="middle" font-size="20"><</text>
    <text x="76" y="220" text-anchor="middle" font-size="10" font-weight="700">Web</text>
    <rect x="32" y="244" width="88" height="56" rx="10" fill="#ffffff" stroke="#e8e3da" stroke-width="1.5"/>
    <text x="76" y="266" text-anchor="middle" font-size="20">></text>
    <text x="76" y="292" text-anchor="middle" font-size="10" font-weight="700">AI agents</text>
  </g>
  <!-- Arrows to proposal -->
  <path d="M126 128 L168 128 M126 200 L168 200 M126 272 L168 272" stroke="#d4cdc2" stroke-width="2" stroke-linecap="round"/>
  <polygon points="168,128 178,123 178,133" fill="#d4cdc2"/>
  <polygon points="168,200 178,195 178,205" fill="#d4cdc2"/>
  <polygon points="168,272 178,267 178,277" fill="#d4cdc2"/>
  <!-- Proposal -->
  <rect x="178" y="160" width="130" height="100" rx="12" fill="#ffffff" stroke="#fa5400" stroke-width="2" filter="url(#s)"/>
  <text x="243" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#0a0a0a">Agent action</text>
  <text x="243" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#0a0a0a">proposal</text>
  <text x="243" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5c5650">Structured intent</text>
  <!-- Arrow to shield -->
  <path d="M310 210 L348 210" stroke="#d4cdc2" stroke-width="2"/>
  <polygon points="348,210 358,205 358,215" fill="#d4cdc2"/>
  <!-- Shield / verification -->
  <path d="M348 110 L572 110 L592 130 L592 330 L460 380 L328 330 L328 130 Z" fill="url(#shield)" opacity="0.95" filter="url(#s)"/>
  <text x="460" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#ffffff">AgentOG verification layer</text>
  <!-- Inner boxes -->
  <rect x="368" y="168" width="184" height="52" rx="8" fill="#ffffff" fill-opacity="0.95"/>
  <text x="460" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#0a0a0a">Action fingerprint</text>
  <text x="460" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5c5650">Cryptographic binding</text>
  <rect x="368" y="232" width="184" height="52" rx="8" fill="#ffffff" fill-opacity="0.95"/>
  <text x="460" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#0a0a0a">Human approval</text>
  <text x="460" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5c5650">Exact payload consent</text>
  <rect x="368" y="296" width="184" height="52" rx="8" fill="#ffffff" fill-opacity="0.95"/>
  <text x="460" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#0a0a0a">Execution gate</text>
  <text x="460" y="334" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5c5650">Token + payload match</text>
  <!-- Out paths -->
  <path d="M612 220 L652 220 L672 180" stroke="#15803d" stroke-width="2" fill="none"/>
  <text x="688" y="175" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#15803d">Approved ’ allowed</text>
  <path d="M612 250 L652 250 L672 290" stroke="#c2410c" stroke-width="2" fill="none"/>
  <text x="688" y="305" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#c2410c">Changed payload ’ blocked</text>
  <!-- Outputs -->
  <g font-family="system-ui, sans-serif" font-size="9">
    <rect x="672" y="88" width="100" height="36" rx="8" fill="#ffffff" stroke="#e8e3da"/>
    <text x="722" y="110" text-anchor="middle" fill="#2a2a2a" font-weight="700">Payment</text>
    <rect x="782" y="88" width="100" height="36" rx="8" fill="#ffffff" stroke="#e8e3da"/>
    <text x="832" y="110" text-anchor="middle" fill="#2a2a2a" font-weight="700">Booking</text>
    <rect x="672" y="132" width="100" height="36" rx="8" fill="#ffffff" stroke="#e8e3da"/>
    <text x="722" y="154" text-anchor="middle" fill="#2a2a2a" font-weight="700">Form submit</text>
    <rect x="782" y="132" width="100" height="36" rx="8" fill="#ffffff" stroke="#e8e3da"/>
    <text x="832" y="154" text-anchor="middle" fill="#2a2a2a" font-weight="700">Audit receipt</text>
  </g>
  <rect x="672" y="300" width="210" height="40" rx="8" fill="#fee2e2" stroke="#f87171"/>
  <text x="777" y="324" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="800" fill="#991b1b">Blocked  fingerprint mismatch</text>
</svg>
